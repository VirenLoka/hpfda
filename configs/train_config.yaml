# =============================================================================
# Healthcare Provider Fraud Detection - Heterogeneous GNN configuration
#
# The pipeline builds ONE heterogeneous graph from the raw CSVs:
#   node types : provider (labeled target), beneficiary, physician, claim
#   edges      : beneficiary<->claim, claim<->provider, physician<->claim
# Training is transductive node classification on provider nodes, with
# train/test boolean masks over those nodes.
#
# Every script (graph build, training, inference) reads from this file.
# =============================================================================

seed: 42

# -----------------------------------------------------------------------------
# Data / graph construction (src/aggregate_data.py)
# -----------------------------------------------------------------------------
data:
  raw_dir: healthcare_fraud_data
  files:
    train_labels: Train-1542865627584.csv
    beneficiary: Train_Beneficiarydata-1542865627584.csv
    inpatient: Train_Inpatientdata-1542865627584.csv
    outpatient: Train_Outpatientdata-1542865627584.csv

  output_dir: data
  graph_path: data/graph.pt
  metadata_json: data/graph_metadata.json

  # A few held-out test providers are written here for inference demos.
  sample_providers_csv: samples/sample_providers.csv
  n_sample_providers: 10

  # Provider-level train/test split (the labeled nodes), stratified by fraud.
  test_size: 0.2
  stratify: true

# -----------------------------------------------------------------------------
# Feature engineering
# -----------------------------------------------------------------------------
features:
  icd:
    embedding_dim: 32        # dim of learned ICD diagnosis/procedure embeddings
    max_diagnosis: 10        # ClmDiagnosisCode_1..10
    max_procedure: 6         # ClmProcedureCode_1..6
  # Beneficiary categorical columns that get their own learned embeddings.
  beneficiary_categorical: [Gender, Race, State, RenalDiseaseIndicator]
  cat_embedding_dim: 8

# -----------------------------------------------------------------------------
# Heterogeneous GNN architecture
# -----------------------------------------------------------------------------
model:
  hidden_dim: 64
  n_layers: 2              # message-passing rounds
  dropout: 0.2
  conv: sage              # per-relation operator (GraphSAGE)
  n_classes: 2

# -----------------------------------------------------------------------------
# Loss (fraud is imbalanced)
# -----------------------------------------------------------------------------
loss:
  type: focal             # focal | weighted_ce
  focal_gamma: 2.0
  class_weights: auto     # auto = inverse-frequency (alpha for focal / weight for CE), or null

# -----------------------------------------------------------------------------
# Training (full-batch transductive)
# -----------------------------------------------------------------------------
training:
  epochs: 100
  lr: 0.005
  weight_decay: 0.0005
  device: auto            # auto | cpu | cuda | mps
  eval_every: 1           # evaluate on the test mask every N epochs
  grad_clip: 1.0

# -----------------------------------------------------------------------------
# Logging - all paths fully configurable
# -----------------------------------------------------------------------------
logging:
  log_dir: runs/gnn_exp1
  log_file: runs/gnn_exp1/train.log
  tensorboard: true
  log_every: 10           # log every N epochs

# -----------------------------------------------------------------------------
# Checkpointing - all paths fully configurable
# -----------------------------------------------------------------------------
checkpoint:
  dir: checkpoints/gnn_exp1
  save_every: 5
  keep_last: 3
  best_metric: f1         # loss | acc | f1 | auc
  best_mode: max

# -----------------------------------------------------------------------------
# Inference: score provider nodes from a trained checkpoint.
# Input is a CSV with a "Provider" column; the providers must exist in the graph.
# -----------------------------------------------------------------------------
inference:
  checkpoint: checkpoints/gnn_exp1/best.pt
  input_csv: samples/sample_providers.csv
  output_csv: samples/provider_predictions.csv
